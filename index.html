<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과일 마피아</title>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f2f5;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 460px;
      box-sizing: border-box;
    }

    h1 {
      color: #2c3e50;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: #7f8c8d;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }

    input {
      padding: 16px;
      border: 1px solid #dcdfe4;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      width: 100%;
    }

    input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.12);
    }

    #result {
      font-size: 2rem;
      font-weight: 800;
      margin: 24px 0 14px 0;
      color: #34495e;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #eee;
      border-radius: 15px;
      padding: 12px;
      box-sizing: border-box;
      word-break: keep-all;
      text-align: center;
    }

    #proof-box {
      display: none;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5eaf0;
      text-align: left;
    }

    #proof-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    .proof-row {
      font-size: 0.92rem;
      color: #5d6d7e;
      line-height: 1.7;
      word-break: break-all;
    }

    .proof-label {
      font-weight: 700;
      color: #34495e;
      margin-right: 6px;
    }

    button {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
      width: 100%;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(52, 152, 219, 0.35);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2);
    }

    .notice {
      font-size: 0.88rem;
      color: #7f8c8d;
      margin-top: 22px;
      line-height: 1.7;
      text-align: left;
      background: #fdfdfd;
      padding: 14px;
      border-radius: 10px;
    }

    .small {
      font-size: 0.82rem;
      color: #95a5a6;
      margin-top: 8px;
      line-height: 1.6;
      text-align: left;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🍓 과일 마피아 🕵️‍♂️</h1>
    <p class="sub">
      방 코드를 입력하고<br />
      역할을 확인하세요.
    </p>

    <div class="input-wrap" id="input-wrap">
      <input id="room-code" type="text" placeholder="예: 1-3482-8-2" autocomplete="off" />
      <button id="main-btn">방 입장하고 역할 받기</button>
      <div class="small">
        형식: 모드-시드-인원-마피아수<br />
        모드 1: 시민 전원이 같은 과일<br />
        모드 2: 시민이 두 팀으로 나뉘어 다른 과일<br />
        같은 방 코드라도 한국 날짜가 바뀌면 새 조합이 생성됨
      </div>
    </div>

    <div id="result">역할 확인 전</div>

    <div id="proof-box">
      <div id="proof-title">참여 정보</div>
      <div class="proof-row">
        <span class="proof-label">오늘 날짜</span>
        <span id="proof-date"></span>
      </div>
      <div class="proof-row">
        <span class="proof-label">방 코드</span>
        <span id="proof-room-code"></span>
      </div>
    </div>

    <div class="notice">
      • <b>글자 수 언급 금지</b><br />
      • 예: “두 글자야”, “받침 있어” 같은 힌트 금지<br />
      • 정원이 꽉 차면 <b>“다음 기회에”</b>가 표시됨<br />
      • 한국 시간 자정이 지나면 같은 코드도 새 판으로 처리됨
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDxACMfz5Q7Qjnsi_I7Jhxv6kJzSiUoE0o",
      authDomain: "neo-mafia.firebaseapp.com",
      projectId: "neo-mafia",
      storageBucket: "neo-mafia.firebasestorage.app",
      messagingSenderId: "991317391706",
      appId: "1:991317391706:web:0159ef3e26f8336be95b63",
      measurementId: "G-R8Y19DB9W9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const FRUITS = [
      "사과", "배", "복숭아", "자두", "포도", "수박", "참외", "멜론", "딸기", "체리",
      "블루베리", "망고", "파인애플", "오렌지", "귤", "키위", "감", "석류", "바나나", "레몬",
      "무화과", "살구", "자몽", "라임", "유자", "모과", "앵두", "매실", "산딸기",
      "라즈베리", "블랙베리", "크랜베리", "아보카도", "코코넛", "두리안", "리치", "패션프루트", "용과",
      "스타프루트", "구아바", "파파야", "망고스틴", "아사이베리", "오디",
      "대추", "플럼코트", "천도복숭아", "황도", "백도", "거봉", "청포도", "적포도", "샤인머스캣",
      "머루", "캠벨포도", "코코넛", "한라봉", "천혜향", "레드향", "금귤",
      "청사과", "홍옥", "아오리사과", "부사", "돌배", "서양배", "아로니아", "복분자", "구기자", "산수유열매"
    ];

    const roomCodeInput = document.getElementById("room-code");
    const mainBtn = document.getElementById("main-btn");
    const resultDiv = document.getElementById("result");
    const inputWrap = document.getElementById("input-wrap");

    const proofBox = document.getElementById("proof-box");
    const proofDate = document.getElementById("proof-date");
    const proofRoomCode = document.getElementById("proof-room-code");

    const LAST_ROOM_KEY = "fruit_mafia_last_room";

    const savedRoom = localStorage.getItem(LAST_ROOM_KEY);
    if (savedRoom) {
      roomCodeInput.value = savedRoom;
    }

    mainBtn.addEventListener("click", joinRoom);
    roomCodeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        joinRoom();
      }
    });

    async function waitForAuthReady() {
      return new Promise((resolve) => {
        const unsubscribe = onAuthStateChanged(
          auth,
          (user) => {
            unsubscribe();
            resolve(user);
          },
          () => resolve(null)
        );
      });
    }

    async function ensureAuth() {
      const existingUser = await waitForAuthReady();
      if (existingUser) return existingUser;

      const userCredential = await signInAnonymously(auth);
      return userCredential.user;
    }

    function parseRoomCode(code) {
      const match = code.trim().match(/^([12])-(\d{4})-(\d+)-(\d+)$/);

      if (!match) {
        throw new Error("방 코드 형식은 1-3482-8-2 이야.");
      }

      const mode = Number(match[1]);
      const seed = match[2];
      const capacity = Number(match[3]);
      const mafiaCount = Number(match[4]);

      if (capacity < 3) {
        throw new Error("참가 인원은 3명 이상이어야 해.");
      }

      if (mafiaCount < 1) {
        throw new Error("마피아는 1명 이상이어야 해.");
      }

      if (mafiaCount >= capacity) {
        throw new Error("마피아 수는 전체 인원보다 적어야 해.");
      }

      return { mode, seed, capacity, mafiaCount };
    }

    function getKstDateKey() {
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });

      const parts = formatter.formatToParts(new Date());
      const year = parts.find(part => part.type === "year").value;
      const month = parts.find(part => part.type === "month").value;
      const day = parts.find(part => part.type === "day").value;

      return `${year}${month}${day}`;
    }

    function formatKstDisplayDate(dateKey) {
      const year = dateKey.slice(0, 4);
      const month = dateKey.slice(4, 6);
      const day = dateKey.slice(6, 8);
      return `${year}.${month}.${day} (KST)`;
    }

    function buildRoomId(dateKey, roomCode) {
      return `${dateKey}__${roomCode}`;
    }

    function xmur3(str) {
      let h = 1779033703 ^ str.length;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = (h << 13) | (h >>> 19);
      }
      return function () {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        return (h ^= h >>> 16) >>> 0;
      };
    }

    function mulberry32(a) {
      return function () {
        let t = (a += 0x6D2B79F5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function rngFromString(str) {
      const seedFn = xmur3(str);
      return mulberry32(seedFn());
    }

    function shuffleWithRng(arr, rng) {
      const copied = [...arr];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function buildRoles(roomCode, dateKey) {
      const { mode, capacity, mafiaCount } = parseRoomCode(roomCode);
      const citizenCount = capacity - mafiaCount;

      const dailySeedBase = `${dateKey}|${roomCode}`;

      const fruitPool = shuffleWithRng(FRUITS, rngFromString("fruit|" + dailySeedBase));
      const fruitA = fruitPool[0];
      const fruitB = mode === 2 ? fruitPool[1] : fruitPool[0];

      const aCount = mode === 2 ? Math.ceil(citizenCount / 2) : citizenCount;
      const bCount = citizenCount - aCount;

      const roles = [
        ...Array(aCount).fill(fruitA),
        ...Array(bCount).fill(fruitB),
        ...Array(mafiaCount).fill("마피아 (힌트: 과일)")
      ];

      return shuffleWithRng(roles, rngFromString("role|" + dailySeedBase));
    }

    async function joinRoom() {
      try {
        const roomCode = roomCodeInput.value.trim();

        if (!roomCode) {
          throw new Error("방 코드를 입력해줘.");
        }

        const settings = parseRoomCode(roomCode);
        const dateKey = getKstDateKey();
        const roomId = buildRoomId(dateKey, roomCode);
        const roles = buildRoles(roomCode, dateKey);

        localStorage.setItem(LAST_ROOM_KEY, roomCode);
        setLoading(true);

        const user = await ensureAuth();
        const uid = user.uid;

        const roomRef = doc(db, "rooms", roomId);
        const playerRef = doc(db, "rooms", roomId, "players", uid);

        const result = await runTransaction(db, async (tx) => {
          const mySnap = await tx.get(playerRef);

          if (mySnap.exists()) {
            return {
              status: "joined",
              role: mySnap.data().role,
              roomCode,
              dateKey
            };
          }

          const roomSnap = await tx.get(roomRef);

          if (!roomSnap.exists()) {
            const role = roles[0];

            tx.set(roomRef, {
              roomCode: roomCode,
              dateKey: dateKey,
              mode: settings.mode,
              seed: settings.seed,
              capacity: settings.capacity,
              mafiaCount: settings.mafiaCount,
              playerCount: 1,
              createdAt: serverTimestamp()
            });

            tx.set(playerRef, {
              uid: uid,
              slotIndex: 0,
              role: role,
              joinedAt: serverTimestamp()
            });

            return {
              status: "joined",
              role: role,
              roomCode,
              dateKey
            };
          }

          const roomData = roomSnap.data();

          if (
            roomData.roomCode !== roomCode ||
            roomData.dateKey !== dateKey ||
            roomData.mode !== settings.mode ||
            roomData.seed !== settings.seed ||
            roomData.capacity !== settings.capacity ||
            roomData.mafiaCount !== settings.mafiaCount
          ) {
            throw new Error("방 설정이 일치하지 않아.");
          }

          const count = roomData.playerCount || 0;

          if (count >= roomData.capacity) {
            return { status: "full" };
          }

          const role = roles[count];

          tx.update(roomRef, {
            playerCount: count + 1
          });

          tx.set(playerRef, {
            uid: uid,
            slotIndex: count,
            role: role,
            joinedAt: serverTimestamp()
          });

          return {
            status: "joined",
            role: role,
            roomCode,
            dateKey
          };
        });

        if (result.status === "full") {
          displayFull();
        } else {
          displayRole(result.role, result.roomCode, result.dateKey);
        }

      } catch (error) {
        console.error(error);

        if (error.code === "auth/operation-not-allowed") {
          showError("Firebase에서 익명 로그인을 먼저 켜줘야 해.");
          return;
        }

        if (error.code === "permission-denied") {
          showError("Firestore Rules가 아직 적용되지 않았어.");
          return;
        }

        showError(error.message || "오류가 발생했어.");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      mainBtn.disabled = isLoading;
      mainBtn.textContent = isLoading ? "입장 중..." : "방 입장하고 역할 받기";
    }

    function displayRole(role, roomCode, dateKey) {
      resultDiv.innerText = role;
      inputWrap.style.display = "none";

      proofDate.innerText = formatKstDisplayDate(dateKey);
      proofRoomCode.innerText = roomCode;
      proofBox.style.display = "block";

      if (role.includes("마피아")) {
        resultDiv.style.color = "#e74c3c";
        resultDiv.style.borderColor = "#ffcccc";
      } else {
        resultDiv.style.color = "#27ae60";
        resultDiv.style.borderColor = "#ccffdd";
      }
    }

    function displayFull() {
      resultDiv.innerText = "다음 기회에";
      resultDiv.style.color = "#7f8c8d";
      resultDiv.style.borderColor = "#dddddd";
      proofBox.style.display = "none";
    }

    function showError(message) {
      resultDiv.innerText = message;
      resultDiv.style.color = "#e67e22";
      resultDiv.style.borderColor = "#f5cba7";
      proofBox.style.display = "none";
    }
  </script>
</body>
</html>
